# Local dev config. Use a local Postgres on port 5433.
#
# Spin it up:
#   docker run -d --name hobby-pg -p 5433:5432 \
#     -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=devpass \
#     postgres:16-alpine
#   # then connect and CREATE DATABASE rv_trip_dev; etc.

server:
  port: 5002
  env: "development"

projects:
  - name: rv
    database:
      host: "localhost"
      port: 5433
      name: "rv_trip_dev"
      user: "postgres"
      password: "devpass"
    url_prefix: "/api/rv"
    cookie_path: "/rv/"
